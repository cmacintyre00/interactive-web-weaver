[build]
  publish = "dist"
  command = "npm run build"

# HTML files - always revalidate so users get the latest deploy
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Hashed assets (JS, CSS) - immutable so browsers can evict old versions confidently
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Favicon and static images - cache for 1 day, revalidate after
[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"
